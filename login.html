<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistemas Informáticos CEA – Acceso</title>
    <!-- Meta tags para compartir (WhatsApp, FB, etc.) -->
    <meta property="og:title" content="Sistemas Informáticos CEA – Acceso">
    <meta property="og:description" content="Ingresa a tu cuenta para continuar tu aprendizaje">
    <meta property="og:image" content="https://modulos-cea-frontend.up.railway.app/instalar/icon-512.png">
    <meta property="og:url" content="https://modulos-cea-frontend.up.railway.app/login.html">
    <meta name="twitter:card" content="summary_large_image">
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="instalar/manifest.json">
    <meta name="theme-color" content="#0ea5e9">
    <link rel="apple-touch-icon" href="images/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="js/api.js"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --accent:  #6c63ff;
            --accent2: #48d18e;
            --dark:    #0b0f1a;
            --card:    #131929;
            --border:  rgba(255,255,255,.08);
            --text:    #e8eaf0;
            --muted:   rgba(255,255,255,.45);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ─── Background blobs ─── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 20% 20%, rgba(108,99,255,.18) 0%, transparent 70%),
                radial-gradient(ellipse 50% 40% at 80% 80%, rgba(72,209,142,.12) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ─── Navbar ─── */
        nav {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.2rem 2.5rem;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(12px);
            background: rgba(11,15,26,.7);
        }

        .nav-logo img {
            height: 50px;
            object-fit: contain;
            filter: drop-shadow(0 0 12px rgba(108,99,255,.4));
        }

        .nav-badge {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            font-size: .72rem;
            font-weight: 700;
            letter-spacing: .08em;
            padding: .3rem .8rem;
            border-radius: 20px;
            text-transform: uppercase;
        }

        /* ─── Main wrapper ─── */
        main {
            position: relative;
            z-index: 1;
            flex: 1;
            display: grid;
            place-items: center;
            padding: 2rem 1rem;
        }

        /* ─── Card ─── */
        .login-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2rem 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 30px 80px rgba(0,0,0,.5);
            animation: slideUp .5s cubic-bezier(.22,1,.36,1) both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card-logo {
            display: flex;
            justify-content: center;
            margin-bottom: 1.2rem;
        }

        .card-logo img {
            height: 65px;
            object-fit: contain;
            filter: drop-shadow(0 0 18px rgba(108,99,255,.5));
        }

        .card-title {
            font-size: 1.6rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: .3rem;
            background: linear-gradient(90deg, #fff 40%, var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card-sub {
            text-align: center;
            color: var(--muted);
            font-size: .85rem;
            margin-bottom: 1.5rem;
        }

        /* ─── Form ─── */
        .field {
            margin-bottom: 1.3rem;
        }

        .field label {
            display: block;
            font-size: .78rem;
            font-weight: 700;
            letter-spacing: .06em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: .5rem;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap .ico {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1rem;
            pointer-events: none;
        }

        .input-wrap input {
            width: 100%;
            background: rgba(255,255,255,.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: .85rem 1rem .85rem 2.8rem;
            color: var(--text);
            font-size: .95rem;
            font-family: 'Inter', sans-serif;
            transition: border-color .2s, box-shadow .2s;
            outline: none;
        }

        .input-wrap input::placeholder { color: var(--muted); }

        .input-wrap input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(108,99,255,.2);
        }

        /* toggle password */
        .toggle-pw {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 1rem;
            padding: 0;
        }

        /* ─── Button ─── */
        .btn-login {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--accent) 0%, #8b5cf6 100%);
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            margin-top: .6rem;
            transition: opacity .2s, transform .15s;
            position: relative;
            overflow: hidden;
        }

        .btn-login::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0);
            transition: background .2s;
        }

        .btn-login:hover { opacity: .92; transform: translateY(-1px); }
        .btn-login:active { transform: translateY(0); }
        .btn-login:disabled { opacity: .55; cursor: not-allowed; transform: none; }

        /* ─── Toast ─── */
        #toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: .85rem 1.6rem;
            font-size: .88rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: .6rem;
            z-index: 9999;
            transition: transform .35s cubic-bezier(.22,1,.36,1), opacity .35s;
            opacity: 0;
            pointer-events: none;
            min-width: 260px;
            max-width: 90vw;
            text-align: center;
        }

        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        #toast.success { border-color: var(--accent2); color: var(--accent2); }
        #toast.error   { border-color: #f87171; color: #f87171; }
        #toast.warning { border-color: #fbbf24; color: #fbbf24; }

        /* ─── Footer ─── */
        footer {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 1rem;
            font-size: .74rem;
            color: var(--muted);
        }

        @media (max-width: 480px) {
            nav { padding: 1rem 1.2rem; }
            .login-card { padding: 2.2rem 1.4rem 2rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-logo">
            <img src="images/logo.png" alt="Sistemas Informáticos CEA"
                 onerror="this.style.display='none'">
        </div>
        <span class="nav-badge">✦ Plataforma Académica Pro</span>
    </nav>

    <main>
        <div class="login-card">
            <div class="card-logo">
                <img src="images/logo.png" alt="Logo"
                     onerror="this.style.display='none'">
            </div>

            <h1 class="card-title">Bienvenido</h1>
            <p class="card-sub">Ingresa a tu cuenta para continuar tu aprendizaje</p>

            <form id="login-form" autocomplete="off">
                <div class="field">
                    <label for="email">Correo electrónico</label>
                    <div class="input-wrap">
                        <span class="ico">✉</span>
                        <input type="email" id="email" required
                               placeholder="nombre@Sistemas Informáticos CEA.com">
                    </div>
                </div>

                <div class="field">
                    <label for="password">Contraseña</label>
                    <div class="input-wrap">
                        <span class="ico">🔒</span>
                        <input type="password" id="password" required
                               placeholder="Tu contraseña">
                        <button type="button" class="toggle-pw" id="toggle-pw"
                                aria-label="Mostrar contraseña">👁</button>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="btn-submit">
                    Ingresar a Sistemas Informáticos CEA
                </button>
            </form>
        </div>
    </main>

    <footer>© 2026 Sistemas Informáticos CEA · Plataforma Educativa Pro</footer>

    <div id="toast"></div>

    <script>
        // Toggle password visibility
        document.getElementById('toggle-pw').addEventListener('click', () => {
            const inp = document.getElementById('password');
            const btn = document.getElementById('toggle-pw');
            if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
            else                         { inp.type = 'password'; btn.textContent = '👁'; }
        });

        // Toast utility
        let toastTimer;
        function showToast(msg, type = 'error') {
            clearTimeout(toastTimer);
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `show ${type}`;
            toastTimer = setTimeout(() => { t.className = ''; }, 4000);
        }

        // Form submit
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault(); // Bloqueo inmediato de recarga
            
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn      = document.getElementById('btn-submit');

            if (!email || !password) {
                showToast('Por favor, completa todos los campos', 'warning');
                return;
            }

            btn.disabled    = true;
            btn.textContent = 'Verificando...';

            console.log('Intentando login para:', email);

            try {
                const body = new URLSearchParams({ username: email, password });
                const res  = await fetch(API_URL + '/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body
                });
                
                const data = await res.json();

                if (res.ok) {
                    console.log('Login exitoso:', data.rol);
                    showToast('¡Bienvenido! Redirigiendo...', 'success');
                    
                    // Guardar datos
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('user', JSON.stringify({
                        nombre: data.nombre || 'Usuario',
                        rol: data.rol,
                        nivel_asignado: data.nivel_asignado
                    }));

                    // Redirección con pequeño delay para el toast
                    setTimeout(() => {
                        let target = 'student/dashboard.html';
                        if (data.rol === 'administrador') target = 'admin/dashboard.html';
                        else if (data.rol === 'profesor') target = 'profesor/dashboard.html';
                        else if (data.rol === 'tercer_grupo') target = 'tercer_grupo.html';
                        
                        console.log('Navegando a:', target);
                        window.location.href = target;
                    }, 800);
                } else {
                    console.error('Error de login:', data.detail);
                    showToast(data.detail || 'Credenciales incorrectas', 'error');
                    btn.disabled = false;
                    btn.textContent = 'Ingresar a Sistemas Informáticos CEA';
                }
            } catch (err) {
                console.error('Fallo de conexión:', err);
                showToast('Error de conexión. Revisa el servidor.', 'error');
                btn.disabled = false;
                btn.textContent = 'Ingresar a Sistemas Informáticos CEA';
            }
        });

    </script>
    <!-- script para instalar a pantalla -->
    <script src="./instalar/pwa.js"></script>
</body>
</html>
