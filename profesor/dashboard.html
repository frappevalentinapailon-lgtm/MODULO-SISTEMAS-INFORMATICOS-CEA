<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistemas Informáticos CEA – Panel Profesor</title>
<!-- PWA Meta Tags -->
<link rel="manifest" href="../instalar/manifest.json">
<meta name="theme-color" content="#0ea5e9">
<link rel="apple-touch-icon" href="../images/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="../js/caratulas_db.js"></script>
<script src="../js/api.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--a:#0ea5e9;--a2:#38bdf8;--dark:#0b0f1a;--card:#131929;--card2:#1a2338;--b:rgba(255,255,255,.08);--t:#e8eaf0;--m:rgba(255,255,255,.45);--cel:rgba(56,189,248,.13)}
body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--t);min-height:100vh;overflow-x:hidden}

/* HEADER */
header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:.8rem 1.2rem;border-bottom:1px solid var(--b);backdrop-filter:blur(14px);background:rgba(11,15,26,.92)}
.hdr-name{font-size:1.1rem;font-weight:800;text-transform:uppercase;color:var(--t)}
.hdr-badge{background:var(--a);color:#fff;padding:.5rem 1rem;border-radius:20px;font-size:.9rem;font-weight:800;text-align:center}
.btn-out{background:rgba(248,113,113,.1);color:#f87171;border:1px solid rgba(248,113,113,.3);padding:.5rem 1rem;border-radius:16px;cursor:pointer;font-weight:700;font-size:.9rem}

/* HERO */
.hero{text-align:center;padding:2.5rem 1rem 1.5rem}
.hero h1{font-size:2rem;font-weight:900;margin-bottom:.5rem}
.hero p{color:var(--m);font-size:1rem;line-height:1.4;max-width:500px;margin:0 auto}

.wrap{width: 80%; max-width: 1600px; margin:0 auto; padding:0 1rem 5rem}

/* PESTAÑAS SEMESTRE */
.sem-tabs{display:flex;justify-content:center;flex-wrap:wrap;gap:.4rem;padding-bottom:.5rem;margin-bottom:1.5rem;scrollbar-width:none}
.sem-tabs::-webkit-scrollbar{display:none}
.sem-btn{padding:.7rem 1.2rem;border-radius:20px;border:1.5px solid var(--b);background:none;color:var(--m);cursor:pointer;font-weight:700;font-size:1rem;white-space:nowrap}
.sem-btn.active{border-color:var(--a2);color:var(--a2);background:var(--cel)}

/* MÓDULOS */
.mod-card{background:var(--card2);border:1px solid var(--b);border-radius:16px;margin-bottom:1.5rem;overflow:hidden}
.mod-header{padding:1.5rem;cursor:pointer;display:flex;justify-content:space-between;align-items:center;background:var(--card)}
.mod-name{font-size:1.15rem;font-weight:800;color:var(--t)}
.mod-name span{color:var(--a2);margin-right:.5rem}
.mod-body{display:none;padding:1.2rem;border-top:1px solid var(--b)}
.mod-card.open .mod-body{display:block}

/* PESTAÑAS TEMA */
.tema-tabs{display:grid;grid-template-columns:1fr;gap:.5rem;margin-bottom:1.2rem}
@media(min-width:768px){ .tema-tabs{grid-template-columns:repeat(2,1fr)} }
.tema-btn{padding:.6rem 1rem;border-radius:12px;border:1px solid var(--b);background:rgba(255,255,255,.03);color:var(--m);cursor:pointer;font-weight:700;font-size:.75rem;white-space:normal;text-align:left;line-height:1.4;transition:.2s}
.tema-btn.active{background:var(--a);color:#fff;border-color:var(--a)}

/* CONTENIDO TEMA */
.tema-content{display:none}
.tema-content.active{display:block}

/* INPUTS MATERIAL */
.mat-list{display:flex;flex-direction:column;gap:1rem}
.mat-item{background:rgba(0,0,0,.2);padding:1rem;border-radius:12px;border:1px solid var(--b)}
.mat-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.6rem}
.mat-icon{font-size:1.1rem}
.mat-title{font-size:.75rem;font-weight:800;color:var(--a2);text-transform:uppercase}
.slot-input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--b);border-radius:8px;padding:.7rem;color:var(--t);font-size:.8rem;margin-bottom:.6rem;outline:none;transition:.2s}
.slot-input:focus{border-color:var(--a)}
.btn-save{background:var(--a);color:#fff;border:none;padding:.6rem 1.2rem;border-radius:8px;font-weight:800;cursor:pointer;font-size:.75rem;width:100%}

/* Cambio contraseña */
.pass-card{background:var(--card);border:1px solid var(--b);border-radius:16px;padding:1.2rem;margin-top:2rem}
.pass-card h4{font-size:.8rem;font-weight:800;color:var(--a2);margin-bottom:.8rem}
.pass-input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--b);border-radius:8px;padding:.6rem;color:var(--t);font-size:.82rem;margin-bottom:.6rem;outline:none}
.btn-pass{width:100%;background:var(--a);color:#fff;border:none;padding:.7rem;border-radius:8px;font-weight:800;cursor:pointer}

/* Toast */
#toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#0f172a;border:1.5px solid var(--a);padding:.8rem 1.6rem;border-radius:12px;font-size:.82rem;font-weight:700;display:none;z-index:999;white-space:nowrap;text-align:center}
</style>
</head>
<body>

<header>
  <div class="hdr-name" id="hdr-name">PROFESOR</div>
  <div class="hdr-badge" id="hdr-badge">Cargando...</div>
  <button class="btn-out" id="btn-logout">Salir</button>
</header>

<div class="hero">
  <h1 id="welcome-title">¡Hola!</h1>
  <p>Gestión de publicaciones. Selecciona el <strong>MÓDULO</strong>, el <strong>TEMA</strong> y sube el material para tus estudiantes..</p>
</div>

<div class="wrap">
  <div class="sem-tabs" id="nivel-tabs" style="margin-bottom:0.5rem;"></div>
  <div class="sem-tabs" id="sem-tabs"></div>
  <div id="mods-area"><p style="color:var(--m);text-align:center;padding:2rem">Cargando módulos...</p></div>

  <!-- Cambio contraseña -->
  <div class="pass-card">
    <h4>🔑 Cambiar Contraseña</h4>
    <input class="pass-input" type="password" id="np1" placeholder="Nueva contraseña (mín. 4 caracteres)">
    <input class="pass-input" type="password" id="np2" placeholder="Repetir contraseña">
    <button class="btn-pass" onclick="cambiarPass()">Actualizar Contraseña</button>
    <div id="pass-msg" style="font-size:.72rem;margin-top:.5rem;text-align:center"></div>
  </div>
</div>

<div id="toast"></div>

<script>
const API = "https://modulos-cea-backend.up.railway.app";
const TOKEN = localStorage.getItem('token');

const MALLA = {
  "Básico": [{
    sem: "1er SEMESTRE – TÉCNICO BÁSICO",
    mods: [
      { nombre: "TALLER DE SISTEMAS OPERATIVOS I", temas: ["Introducción a los sistemas operativos", "Máquinas virtuales y Emulación", "Administración de recursos de hardware", "Administración de plataforma Windows"] },
      { nombre: "MATEMÁTICA PARA LA INFORMÁTICA", temas: ["Fundamentos y Sistemas de Numeración", "Lógica Matemática y Álgebra Booleana", "Teoría de Conjuntos, Relaciones y Funciones", "Sucesiones y series numéricas"] },
      { nombre: "PROGRAMACIÓN I-A", temas: ["Diseño de algoritmos", "Lenguaje de programación e IDEs", "Estructuras básicas de control", "Resolución de Problemas y Pruebas de Escritorio"] },
      { nombre: "HARDWARE DE COMPUTADORAS I", temas: ["Evolución y generación de computadoras", "Arquitectura y Partes de una computadora", "Instalación de sistemas operativos y software", "Internet de las cosas (IoT)"] },
      { nombre: "EMERGENTE I (INTELIGENCIA ARTIFICIAL BÁSICA)", temas: ["Fundamentos de la Inteligencia Artificial", "Uso incorrecto de la IA en la informática", "Limitaciones tecnológicas de la IA actual", "Uso responsable y ético como futuros profesionales"] }
    ]
  }],
  "Auxiliar": [{
    sem: "2do SEMESTRE – TÉCNICO AUXILIAR",
    mods: [
      { nombre: "TALLER DE SISTEMAS OPERATIVOS II", temas: ["Administración plataforma Linux", "Contenedores y Virtualización Ligera", "Utilitarios de Sistema", "Seguridad y Gestión de Redes en Linux"] },
      { nombre: "OFIMÁTICA Y TECNOLOGÍA MULTIMEDIA I", temas: ["Procesador de texto avanzado", "Hoja de cálculo avanzado", "Presentaciones interactivas", "Herramientas Colaborativas en la Nube"] },
      { nombre: "PROGRAMACIÓN I-B", temas: ["Estructuras Iterativas (Bucles)", "Programación modular", "Estructuras de Datos Estáticas", "Introducción a la Programación Orientada a Objetos"] },
      { nombre: "HARDWARE DE COMPUTADORAS II", temas: ["Software de mantenimiento e imágenes de sistema", "Mantenimiento preventivo", "Mantenimiento correctivo", "Principios de electrónica aplicados"] },
      { nombre: "EMERGENTE II (PROMPTS BÁSICOS)", temas: ["Fundamentos de Prompts", "Prompts para tareas ofimáticas y soporte técnico", "Errores comunes en Modelos de Lenguaje", "Buenas prácticas y refinamiento"] }
    ]
  }],
  "Medio I": [{
    sem: "3er SEMESTRE – TÉCNICO MEDIO I",
    mods: [
      { nombre: "INGLÉS TÉCNICO", temas: ["Estructuras Gramaticales y Entorno Personal", "Vocabulario de Informática e Internet", "Inglés para Programación y Sistemas de Medida", "Seguridad Industrial y Manuales Técnicos"] },
      { nombre: "DISEÑO Y PROGRAMACIÓN WEB I-A", temas: ["Introducción al diseño web", "HTML (Lenguaje de marcas de hipertexto)", "CSS (Hojas de estilo en cascada)", "Diseño Responsivo y Frameworks Básicos"] },
      { nombre: "PROGRAMACIÓN I-C", temas: ["Programación Orientada a Objetos (POO Avanzada)", "Modelado de Software", "Estructuras de Datos Lineales", "Listas Enlazadas y Colecciones"] },
      { nombre: "OFIMÁTICA Y TECNOLOGÍA MULTIMEDIA II", temas: ["Edición de audio digital", "Edición de video", "Tratamiento de imágenes", "Producción multimedia integral"] },
      { nombre: "EMPRENDIMIENTO PRODUCTIVO E IA APLICADA", temas: ["Emprendimiento Productivo en Tecnología", "Prompt Estructurado para Resolución Lógica", "Uso de IA en Programación y Desarrollo", "Mejora de Resultados mediante Técnicas de Prompting"] }
    ]
  }],
  "Medio II": [{
    sem: "4to SEMESTRE – TÉCNICO MEDIO II",
    mods: [
      { nombre: "REDES DE COMPUTADORAS I", temas: ["Fundamentos y Topologías de Red", "Medios de Transmisión, Dispositivos y Modelos", "Direccionamiento IP y Subredes", "Protocolos y Servicios en TCP/IP"] },
      { nombre: "DISEÑO Y PROGRAMACIÓN WEB I-B", temas: ["Programación Frontend con JavaScript", "Desarrollo de aplicaciones Backend", "Consumo e Integración de APIs", "Administración y publicación de sitios web"] },
      { nombre: "BASE DE DATOS I", temas: ["Introducción a Bases de Datos", "Diseño Conceptual: Modelo Entidad-Relación (E-R)", "Diseño Lógico y Normalización", "Lenguaje SQL y Software para Bases de Datos"] },
      { nombre: "PROGRAMACIÓN MÓVIL I", temas: ["Introducción a las Tecnologías Móviles", "Arquitectura y Componentes para el Desarrollo", "Diseño de Interfaz (UI) y Experiencia de Usuario (UX)", "Aplicación práctica y conexión IoT (Microcontroladores)"] },
      { nombre: "MODALIDADES DE GRADUACIÓN Y PROYECTO FINAL", temas: ["Reglamentación y Elección de Modalidad", "Planificación del Proyecto Tecnológico asistido por IA", "Desarrollo y Generación Estructural con IA", "Iteración, Refinamiento y Defensa Final"] }
    ]
  }]
};

const TIPOS = [
  {id:'teoria', lbl:'Teoría', ico:'📄'},
  {id:'presentacion', lbl:'Presentación', ico:'📊'},
  {id:'audio', lbl:'Audio', ico:'🎵'},
  {id:'video', lbl:'Video', ico:'🎥'},
  {id:'evaluacion', lbl:'Evaluación', ico:'📝'}
];

let modNameToId = {};
let NIVEL = "";
let SEMESTRE_IDX = 0;

// ── INIT
window.addEventListener('DOMContentLoaded', async () => {
  let u = JSON.parse(localStorage.getItem('user') || '{}');
  if (!TOKEN || u.rol !== 'profesor') { window.location.replace('../index.html'); return; }

  // Force update to 'Todos' for the default teacher
  if (u.id === 2 && u.nivel_asignado !== 'Todos') {
    u.nivel_asignado = 'Todos';
    localStorage.setItem('user', JSON.stringify(u));
    let allUsers = JSON.parse(localStorage.getItem('db_users') || '[]');
    let dbUser = allUsers.find(x => x.id === 2);
    if (dbUser) { dbUser.nivel_asignado = 'Todos'; localStorage.setItem('db_users', JSON.stringify(allUsers)); }
  }


  const nombre = (u.nombre || 'Profesor').split(' ')[0].toUpperCase();
  document.getElementById('hdr-name').textContent = nombre;
  document.getElementById('welcome-title').textContent = `¡Hola, ${nombre}!`;
  
  const nivelVisual = 'Todos los niveles';
  document.getElementById('hdr-badge').textContent = `🎯 ${nivelVisual}`;
  NIVEL = Object.keys(MALLA)[0]; // Empezar con el primer nivel disponible

  document.getElementById('btn-logout').addEventListener('click', () => {
    localStorage.clear();
    window.location.replace('../index.html');
  });

  try {
    const r = await fetch(API + '/modulos/');
    const d = await r.json();
    (d.modulos || []).forEach(m => { modNameToId[m.nombre.trim()] = m.id; });
  } catch(e) { console.error(e); }

  renderNivelTabs();
  renderSemTabs();
  renderModulos(SEMESTRE_IDX);
});

function renderNivelTabs() {
  const tabsEl = document.getElementById('nivel-tabs');
  const niveles = Object.keys(MALLA);
  if (niveles.length <= 1) { tabsEl.style.display = 'none'; return; }
  tabsEl.innerHTML = niveles.map(n => `
    <button class="sem-btn ${n===NIVEL?'active':''}" onclick="switchNivel('${n}', this)">🎯 Nivel ${n}</button>
  `).join('');
}

function switchNivel(n, btn) {
  document.querySelectorAll('#nivel-tabs .sem-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  NIVEL = n;
  SEMESTRE_IDX = 0;
  renderSemTabs();
  renderModulos(0);
}

function detectarNivel(s) {
  const low = s.toLowerCase();
  if (low.includes('ingenier')) return 'Ingeniería';
  if (low.includes('superior')) return 'Superior';
  if (low.includes('medio'))    return 'Medio';
  if (low.includes('auxiliar')) return 'Auxiliar';
  return 'Básico';
}

function renderSemTabs() {
  const sems = MALLA[NIVEL] || MALLA['Básico'];
  const tabsEl = document.getElementById('sem-tabs');
  if (sems.length <= 1) { tabsEl.style.display = 'none'; return; }
  tabsEl.innerHTML = sems.map((s, i) => `
    <button class="sem-btn ${i===0?'active':''}" onclick="switchSem(${i}, this)">${s.sem.split(' – ')[0]}</button>
  `).join('');
}

function switchSem(idx, btn) {
  document.querySelectorAll('.sem-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  SEMESTRE_IDX = idx;
  renderModulos(idx);
}

function renderModulos(semIdx) {
  const sems = MALLA[NIVEL] || MALLA['Básico'];
  const sem  = sems[semIdx] || sems[0];
  const area = document.getElementById('mods-area');

  area.innerHTML = sem.mods.map((mod, mi) => `
    <div class="mod-card" id="mc-${mi}">
      <div class="mod-header" onclick="toggleMod(${mi}, '${mod.nombre.replace(/'/g,"\\\\'")}')">
        <div class="mod-name"><span>Módulo ${mi+1}:</span> ${mod.nombre}</div>
        <span style="color:var(--m)">▼</span>
      </div>
      <div class="mod-body" id="mb-${mi}">
        <div class="tema-tabs">
          ${mod.temas.map((tName, tIdx) => `<button class="tema-btn ${tIdx===0?'active':''}" onclick="switchTema(${mi}, ${tIdx+1})" id="tbtn-${mi}-${tIdx+1}"><span style="color:var(--a2)">Tema ${tIdx+1}:</span> ${tName}</button>`).join('')}
        </div>
        <div class="tema-containers">
          ${mod.temas.map((tName, tIdx) => {
            // Obtener el enlace PDF actual de la base de datos de carátulas para pre-llenarlo en Teoría
            let absoluteSem = 0;
            if (NIVEL === 'Auxiliar') absoluteSem = 1;
            else if (NIVEL === 'Medio I') absoluteSem = 2;
            else if (NIVEL === 'Medio II') absoluteSem = 3;

            let temaData = null;
            try {
               // Mapeo absoluto buscando en CARATULAS_DB por semestre y módulo
               temaData = CARATULAS_DB[absoluteSem]?.modulos[mi]?.temas[tIdx] || null;
            } catch(e) {}
            
            return `
            <div class="tema-content ${tIdx===0?'active':''}" id="tcont-${mi}-${tIdx+1}">
              <div class="mat-list">
                ${TIPOS.map(tipo => {
                  let valActual = "";
                  if (temaData) {
                    if (tipo.id === 'teoria') valActual = temaData.pdf || "";
                    else valActual = temaData[tipo.id] || "";
                  }
                  return `
                  <div class="mat-item">
                    <div class="mat-header">
                      <span class="mat-icon">${tipo.ico}</span>
                      <span class="mat-title">${tipo.lbl}</span>
                    </div>
                    <input class="slot-input" type="url" id="sl-${mi}-${tIdx+1}-${tipo.id}" placeholder="Enlace..." value="${valActual}">
                    <button class="btn-save" onclick="guardar(${mi},${tIdx+1},'${tipo.id}')">Guardar</button>
                  </div>
                `}).join('')}
                
                <!-- Extras Dinámicos -->
                <div id="extras-container-${mi}-${tIdx+1}"></div>
                <div class="mat-item" style="background: rgba(14, 165, 233, 0.1); border-style: dashed;">
                  <div class="mat-header">
                    <span class="mat-icon">➕</span>
                    <span class="mat-title">Agregar Material Extra</span>
                  </div>
                  <input class="slot-input" type="text" id="extra-tit-${mi}-${tIdx+1}" placeholder="Título (Ej: PDF Adicional)" style="margin-bottom: .3rem">
                  <input class="slot-input" type="url" id="extra-url-${mi}-${tIdx+1}" placeholder="Enlace...">
                  <button class="btn-save" style="background: var(--a2); color: var(--dark)" onclick="guardarExtra(${mi},${tIdx+1})">Guardar Extra</button>
                </div>
              </div>
            </div>
          `}).join('')}
        </div>
      </div>
    </div>
  `).join('');
}

function switchTema(mi, t) {
  for(let i=1; i<=4; i++) {
    document.getElementById(`tbtn-${mi}-${i}`).classList.remove('active');
    document.getElementById(`tcont-${mi}-${i}`).classList.remove('active');
  }
  // Activar el seleccionado
  document.getElementById(`tbtn-${mi}-${t}`).classList.add('active');
  document.getElementById(`tcont-${mi}-${t}`).classList.add('active');
}

async function toggleMod(mi, modName) {
  const card = document.getElementById('mc-'+mi);
  card.classList.toggle('open');
  if (!card.classList.contains('open')) return;

  const modId = modNameToId[modName] || Object.entries(modNameToId).find(([k])=>k.toLowerCase().includes(modName.toLowerCase().slice(0,8)))?.[1];
  if (!modId) return;

  try {
    const r = await fetch(API + '/modulos/' + modId + '/contenidos');
    const d = await r.json();
    (d.contenidos || []).forEach(c => {
      if (TIPOS.find(x => x.id === c.tipo)) {
        const el = document.getElementById(`sl-${mi}-${c.tema_num}-${c.tipo}`);
        if (el && c.url) el.value = c.url;
      } else {
        // Es un extra
        if (c.url) renderExtraUI(mi, c.tema_num, c.tipo, c.titulo, c.url);
      }
    });
  } catch {}
}

function renderExtraUI(mi, t, tipoId, titulo, url) {
  const container = document.getElementById(`extras-container-${mi}-${t}`);
  if (!container) return;
  // Solo agregar si no existe ya para no duplicar en UI
  if (document.getElementById(`sl-${mi}-${t}-${tipoId}`)) return;

  const div = document.createElement('div');
  div.className = 'mat-item';
  div.innerHTML = `
    <div class="mat-header">
      <span class="mat-icon">🔗</span>
      <span class="mat-title">${titulo}</span>
    </div>
    <input class="slot-input" type="url" id="sl-${mi}-${t}-${tipoId}" value="${url}" placeholder="Enlace...">
    <button class="btn-save" onclick="guardar(${mi},${t},'${tipoId}', '${titulo}')">Actualizar Extra</button>
  `;
  container.appendChild(div);
}

async function guardarExtra(mi, t) {
  const titInput = document.getElementById(`extra-tit-${mi}-${t}`);
  const urlInput = document.getElementById(`extra-url-${mi}-${t}`);
  const titulo = titInput.value.trim() || 'Material Extra';
  const url = urlInput.value.trim();
  if (!url) { showToast('⚠️ Ingresa un enlace'); return; }
  
  // Generar un ID único para el custom tipo
  const tipoId = 'custom_' + Date.now();
  await guardar(mi, t, tipoId, titulo, url);
  
  // Limpiar form de extras y renderizar nuevo
  titInput.value = '';
  urlInput.value = '';
  renderExtraUI(mi, t, tipoId, titulo, url);
}

async function guardar(mi, t, tipo, overrideTitle, overrideUrl) {
  const sems = MALLA[NIVEL] || MALLA['Básico'];
  const modName = sems[SEMESTRE_IDX].mods[mi].nombre;
  const url = overrideUrl || document.getElementById(`sl-${mi}-${t}-${tipo}`).value.trim();
  if (!url) { showToast('⚠️ Ingresa un enlace'); return; }

  let modId = modNameToId[modName] || Object.entries(modNameToId).find(([k])=>k.toLowerCase().includes(modName.toLowerCase().slice(0,8)))?.[1];

  if (!modId) { showToast('⚠️ Módulo no encontrado. Ejecuta /cargar-datos'); return; }

  const tituloFinal = overrideTitle || TIPOS.find(x=>x.id===tipo)?.lbl || 'Extra';

  try {
    const r = await fetch(API + '/modulos/contenido', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
      body: JSON.stringify({ modulo_id: modId, tipo, titulo: tituloFinal, url, tema_num: t })
    });
    if (r.ok) { showToast('✅ Guardado correctamente'); }
    else { showToast('❌ Error al guardar'); }
  } catch { showToast('❌ Error de conexión'); }
}

async function cambiarPass() {
  const p1  = document.getElementById('np1').value;
  const p2  = document.getElementById('np2').value;
  const msg = document.getElementById('pass-msg');
  if (p1.length < 4)  { msg.style.color='#f87171'; msg.textContent='Mínimo 4 caracteres'; return; }
  if (p1 !== p2)      { msg.style.color='#f87171'; msg.textContent='Las contraseñas no coinciden'; return; }
  try {
    const r = await fetch(API + '/auth/update-password', {
      method: 'PUT',
      headers: { Authorization: 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
      body: JSON.stringify({ new_password: p1 })
    });
    if (r.ok) {
      msg.style.color='#48d18e'; msg.textContent='✅ Contraseña actualizada';
      document.getElementById('np1').value=''; document.getElementById('np2').value='';
    } else { msg.style.color='#f87171'; msg.textContent='Error al actualizar'; }
  } catch { msg.style.color='#f87171'; msg.textContent='Error de conexión'; }
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 2500);
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('../sw.js').then(registration => {
      console.log('SW registrado: ', registration.scope);
    }).catch(err => {
      console.log('Fallo registro SW: ', err);
    });
  });
}
</script>
